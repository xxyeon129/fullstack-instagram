spring:
  datasource:
    url: jdbc:mysql://localhost:3306/instagram_db?serverTimezone=UTC&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate       # 기동 시 엔티티와 DB 스키마 일치 여부만 검증 (DDL 자동 변경 없음)
    show-sql: true            # 실행 SQL 콘솔에 출력
    properties:
      hibernate:
        format_sql: true

  security:
    enabled: false            # TODO: Security 활성화

server:
  port: 8080